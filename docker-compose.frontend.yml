version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        API_URL: ${API_URL:-http://localhost:8000}
    container_name: sirret-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - sirret-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./docker/frontend/nginx.conf:/etc/nginx/nginx.conf:ro

networks:
  sirret-network:
    driver: bridge
